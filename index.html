<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>100% Free Calculators, Converters & Dev Tools Suite</title>
    
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('theme');
          var isDark = false;
          if (saved === 'dark') {
            isDark = true;
          } else if (saved === 'light') {
            isDark = false;
          } else {
            isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          }
          if (isDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
    
    <!-- Primary SEO Metadata -->
    <meta name="description" content="Access free, high performance, offline-friendly productivity utilities including dynamic calculators, formatters, mass/length converters, and SEO sitemap indexing tools." />
    <meta name="keywords" content="free tools, online calculators, developer tools, unit converters, tax EMI calculator, offline apps" />
    
    <!-- OpenGraph / Facebook Social Sharing Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="100% Free Calculators, Converters & Dev Tools Suite" />
    <meta property="og:description" content="Access free, high performance, offline-friendly productivity utilities including dynamic calculators, formatters, mass/length converters, and SEO sitemap indexing tools." />
